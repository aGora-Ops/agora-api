name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  id-token: write
  contents: write

jobs:
  gitleaks:
    name: Secret Scan
    uses: aGora-Ops/agora-workflows/.github/workflows/gitleaks.yml@main
    with:
      service_name: agora-api

  python-ci:
    name: Lint & Test
    uses: aGora-Ops/agora-workflows/.github/workflows/python-ci.yml@main
    with:
      working-directory: .
      python-version: "3.12"

  sonar:
    name: SonarCloud Scan
    needs: python-ci
    uses: aGora-Ops/agora-workflows/.github/workflows/sonar-scan.yml@main
    with:
      service_name: agora-api
      working-directory: .
      sonar_organization: ${{ vars.SONAR_ORGANIZATION }}
    secrets: inherit

  build:
    name: Build & Scan
    needs: [gitleaks, python-ci, sonar]
    uses: aGora-Ops/agora-workflows/.github/workflows/build-and-scan.yml@main
    with:
      service_name: agora-api
      dockerfile_path: Dockerfile
      aws_region: us-east-1
      run_trivy: true
    secrets: inherit

  push:
    name: Push to ECR
    needs: build
    # needs: build alone is not sufficient to block on a Trivy failure --
    # reusable-workflow-call failure propagation to the calling job's
    # status isn't documented/guaranteed, so this checks trivy_result
    # explicitly rather than relying on it. Trivy now runs on every event
    # (not just PRs, where it used to be PR-only and never actually
    # gated what reaches ECR).
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') &&
      github.event_name == 'push' &&
      needs.build.outputs.trivy_result != 'failure'
    uses: aGora-Ops/agora-workflows/.github/workflows/push-to-ecr.yml@main
    with:
      service_name: agora-api
      git_tag: ${{ needs.build.outputs.tag }}
      tag_exists: ${{ needs.build.outputs.tag_exists }}
      aws_region: us-east-1
    secrets: inherit

  helm-update:
    name: Update Helm Tag
    needs: push
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && github.event_name == 'push'
    uses: aGora-Ops/agora-workflows/.github/workflows/helm-update.yml@main
    with:
      service_name: agora-api
      image_tag: ${{ needs.push.outputs.tag }}
    secrets: inherit

  notify:
    name: Notify on Failure
    needs: [python-ci, sonar, build, push, helm-update]
    if: always() && contains(needs.*.result, 'failure')
    uses: aGora-Ops/agora-workflows/.github/workflows/notify.yml@main
    with:
      service_name: agora-api
      build_result: ${{ needs.build.result }}
      push_result: ${{ needs.push.result }}
      trivy_result: ${{ needs.build.outputs.trivy_result }}
    secrets: inherit
